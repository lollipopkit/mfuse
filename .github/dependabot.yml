version: 2
updates:
  - package-ecosystem: "swift"
    directories:
      - "/Packages/MFuseCore"
      - "/Packages/MFuseDropbox"
      - "/Packages/MFuseFTP"
      - "/Packages/MFuseGoogleDrive"
      - "/Packages/MFuseNFS"
      - "/Packages/MFuseOneDrive"
      - "/Packages/MFuseS3"
      - "/Packages/MFuseSFTP"
      - "/Packages/MFuseSMB"
      - "/Packages/MFuseTestSupport"
      - "/Packages/MFuseWebDAV"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "swift"
    groups:
      swift-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "bun"
    directory: "/website"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "website"
    groups:
      website-dependencies:
        patterns:
          - "*"
