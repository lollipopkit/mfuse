disabled_rules:
  - trailing_whitespace
  - line_length
  - cyclomatic_complexity
  - function_body_length
  - type_body_length
  - file_length
  - force_cast
  - force_try
  - todo

opt_in_rules:
  - empty_count
  - closure_spacing
  - fatal_error_message
  - first_where
  - toggle_bool

excluded:
  - .build
  - DerivedData
  - "*.generated.swift"
